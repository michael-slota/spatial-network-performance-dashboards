  body {

  .metric-radio-wrap {

  .metric-radio-label {
    font-size: 13px;
    font-weight: 700;
    line-height: 1;
  }
  .metric-radio-options {
    display: inline-flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
  }
  .metric-radio-option input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }
  .metric-radio-option span {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 26px;
    padding: 4px 10px;
    border: 1px solid #b8c4d6;
    border-radius: 999px;
    background: #ffffff;
    color: #183153;
    font-size: 12px;
    font-weight: 600;
    line-height: 1;
    cursor: pointer;
    user-select: none;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
  }
  .metric-radio-option input:checked + span {
    background: #174a7c;
    border-color: #174a7c;
    color: #ffffff;
    box-shadow: 0 0 0 3px rgba(23, 74, 124, 0.18), inset 0 0 0 1px rgba(255, 255, 255, 0.28);
    font-weight: 800;
  }
  .metric-radio-option span:hover {
    border-color: #174a7c;
  }
  .threshold-toggle-wrap {
    display: flex;
    justify-content: center;
    margin: 4px 0 0;
    font-family: Arial, Helvetica, sans-serif;
  }
  .threshold-toggle {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 30px;
    color: #183153;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    user-select: none;
  }
  .threshold-toggle input {
    width: 16px;
    height: 16px;
    accent-color: #111827;
    cursor: pointer;
  }
  .threshold-line-sample {
    width: 20px;
    border-top: 2px dashed #111827;
  }
  .plotly-radio-export {
    width: fit-content;
    max-width: 100%;
    margin: 0 auto;
  }
  .plot-radio-title {
    margin: 6px 0 4px;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 16px;
    font-weight: 500;
    line-height: 1.25;
    text-align: center;
    color: #183153;
  }
  .plot-radio-title + .metric-radio-wrap {
    margin-top: 2px;
    margin-bottom: 0;
  }
  .plotly-radio-export .js-plotly-plot {

  }
